<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablece tu contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Exo 2', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 0;">
    <div style="max-width: 700px; margin: 20px auto; background-color: #e2e2e2; padding: 30px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
        <div style="background: linear-gradient(180deg, #2d2153 0%, #1a1436 100%); padding: 40px 20px; border-radius: 0 0 90px 90px; text-align: center;">
            <img src="https://maplenet.com.bo/_astro/NUEVO%20LOGO%20maplenet-02.CtjJyrAW.webp" alt="Maplenet Logo" style="max-width: 200px; margin: 0 auto;"/>
            <h1 style="color: #ffffff; font-size: 28px; margin: 30px 0; font-weight: 600;">Restablece tu contraseña</h1>
            <p style="color: #ffffff; font-size: 16px; line-height: 1.5; margin-bottom: 30px;">
                Para restablecer tu contraseña, haz clic en el siguiente enlace:
            </p>
            <a href="{{ reset_link }}" style="display: inline-block; background-color: #ffffff; padding: 15px 40px; border-radius: 4px; font-size: 18px; font-weight: bold; color: #2d2153; text-decoration: none;">
                Restablecer Contraseña
            </a>
        </div>
        <div style="padding: 0 40px; margin-top: 30px; text-align: center;">
            <p style="color: #2d2153; font-size: 14px;">Si no solicitaste un restablecimiento de contraseña, ignora este correo.</p>
            <p style="color: #2d2153; font-size: 14px;">Atentamente, el equipo de Maplenet.</p>
        </div>
    </div>
</body>
</html>
